<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>سجو 🤍</title>

<style>
/* 📱 تثبيت حجم الشاشة */
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
font-family:sans-serif;
background:linear-gradient(180deg,#fff,#ffd6e7);
}

/* 🔐 شاشة الدخول */
#lockScreen{
position:fixed;
inset:0;
background:linear-gradient(180deg,#fff,#ffe4f1);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
text-align:center;
}

input{
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-top:10px;
text-align:center;
width:60%;
max-width:250px;
}

button{
margin-top:15px;
padding:12px 25px;
background:#ff4d88;
color:white;
border:none;
border-radius:12px;
font-size:16px;
}

/* 💬 النص */
.text{
font-size:22px;
line-height:1.8;
max-width:320px;
opacity:0;
transform:translateY(20px);
transition:0.6s;
color:#c2185b;
}
.show{
opacity:1;
transform:translateY(0);
}

/* 🖼️ الصورة */
.avatar{
width:140px;
margin-top:20px;
display:none;
border-radius:20px;
box-shadow:0 10px 25px rgba(255,77,136,0.3);
animation:pop 1s ease;
}
@keyframes pop{
from{transform:scale(0);}
to{transform:scale(1);}
}

/* 💗 القلوب */
.heart{
position:absolute;
color:#ff4d88;
font-size:18px;
animation:rise 6s linear forwards;
opacity:0.8;
}

@keyframes rise{
0%{
transform:translate(0,100vh) scale(1);
opacity:1;
}
100%{
transform:translate(0,-20vh) scale(1.5);
opacity:0;
}
}

/* 📩 إشعار */
#notif{
position:fixed;
top:-100px;
left:50%;
transform:translateX(-50%);
background:#fff;
color:#c2185b;
padding:12px 20px;
border-radius:12px;
transition:0.6s;
z-index:9999;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

/* 💌 رسالة */
#secret{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#fff;
color:#c2185b;
padding:25px;
border-radius:15px;
text-align:center;
z-index:9999;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* 🎧 زر */
#musicBtn{
display:none;
margin-top:20px;
background:#ff4d88;
color:#fff;
border:none;
padding:12px 20px;
border-radius:12px;
}
</style>
</head>

<body>

<!-- 🔐 القفل -->
<div id="lockScreen">
<h2>في حاجة مخبيها لك 🤍</h2>
<p>اكتبي الرمز:</p>
<b>سجوو</b>

<input id="pass" placeholder="اكتبي هنا">
<button id="loginBtn">دخول</button>
</div>

<!-- 💗 قلوب -->
<script>
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="♥";

/* 🎯 توجيه القلوب نحو الأعلى (يمين الشاشة كإحساس إشعار) */
h.style.left=(70 + Math.random()*25)+"vw";

document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},400);
</script>

<!-- المحتوى -->
<div style="display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;">
<div>

<div class="text" id="text"></div>

<img id="img" class="avatar" src="Saja.png">

<button onclick="next()">كملي</button>

<button id="musicBtn" onclick="openMusic()">
🎧 اسمعي النهاية
</button>

</div>
</div>

<!-- إشعار -->
<div id="notif">📩 عندك رسالة جديدة 💌</div>

<!-- رسالة -->
<div id="secret">
💌  
يمكن ما قلتهاش قبل…  
بس كل مرة نشوفك فيها  
نحس إني نبيك أكثر 🤍
</div>

<script>

// 📅 الأيام
let startDate=new Date("2025-12-03");
let endDate=new Date("2026-05-10");
let days=Math.floor((endDate-startDate)/(1000*60*60*24));

// النصوص
let texts=[
"10 مايو 🎂\nهذا يومك انتي",
"في الجامعة… بداية كل شي",
"طيبتك وحنّيتك شدوني",
"مهندستي 🤍\nأحلى مهندسة في الدنيا",
"لينا مع بعض ❣️ لمدة "+days+" يوم",
"نحبك يا عيونيي ❣️"
];

let i=0;

// 📳 اهتزاز آمن
function vib(p){
if(navigator.vibrate){
navigator.vibrate(p);
}else{
document.body.style.transform="translateX(5px)";
setTimeout(()=>document.body.style.transform="translateX(-5px)",100);
setTimeout(()=>document.body.style.transform="translateX(0)",200);
}
}

// 🔐 الدخول
document.getElementById("loginBtn").addEventListener("click",function(){

let val=document.getElementById("pass").value.trim();

if(val!=="سجوو"){
vib([300,100,300]);
alert("الرمز غلط 🤍");
return;
}

vib([200,100,200]);

document.getElementById("lockScreen").style.display="none";

type(texts[0]);
});

// ✍️ عرض النص
function type(text){
let el=document.getElementById("text");
el.innerHTML=text.replace(/\n/g,"<br>");
el.classList.remove("show");

setTimeout(()=>el.classList.add("show"),100);

// 🖼️ الصورة
if(i===3){
document.getElementById("img").style.display="block";
}

// 🔥 النهاية
if(i===texts.length-1){

vib([300,100,300,100,500]);

setTimeout(()=>{
document.getElementById("notif").style.top="20px";
},1500);

document.getElementById("musicBtn").style.display="block";
}
}

// التالي
function next(){
i++;
if(i<texts.length){
type(texts[i]);
}
}

// 🎧 يوتيوب
function openMusic(){
window.open("https://youtube.com/watch?v=1t9sfYqZ2iY","_blank");
}

// 📩 إشعار
document.getElementById("notif").onclick=function(){
this.style.display="none";
document.getElementById("secret").style.display="block";
vib([200,100,200,100,500]);
}

</script>

</body>
</html>
