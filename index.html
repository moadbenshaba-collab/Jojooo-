<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجو 🤍</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="bg"></canvas>

<!-- 🎁 -->
<section id="gift" class="scene active">
<div class="giftBox" onclick="openGift()">🎁</div>
<p>لمسي الهدية 🤍</p>
</section>

<!-- 📖 -->
<section id="story" class="scene">
<div id="storyBox">
<div id="storyText"></div>

<button onclick="goCard()">كملي 🤍</button>
</div>
</section>

<!-- 💌 -->
<section id="card" class="scene">
<div class="card">

<img src="Saja.png">

<h2>جوجو 🤍</h2>

<p>
انتي الحاجة اللي غيرتني…  
وخلتني نحس براحة ما عمري حسيتها  
سامحيني لو ضايقتك يوم  
كل شي كان من حبي 🤍
</p>

<button onclick="goDraw()">كملي 💗</button>

</div>
</section>

<!-- 🖌️ -->
<section id="draw" class="scene">
<h3>ارسمي 💗</h3>
<button onclick="go('gift')">إعادة</button>
</section>

<script src="script.js"></script>
</body>
</html>
