<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>سجو 🤍</title>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
font-family:sans-serif;
background:linear-gradient(180deg,#fff,#ffd6e7);
}

/* 🔐 القفل */
#lockScreen{
position:fixed;
inset:0;
background:#fff;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
text-align:center;
}

input{
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-top:10px;
text-align:center;
}

button{
margin-top:15px;
padding:12px 25px;
background:#ff4d88;
color:white;
border:none;
border-radius:12px;
font-size:16px;
}

/* 💬 النص */
.text{
font-size:22px;
line-height:1.8;
max-width:320px;
opacity:0;
transform:translateY(20px);
transition:0.6s;
color:#c2185b;
}
.show{
opacity:1;
transform:translateY(0);
}

/* 🖼️ الصورة */
.avatar{
width:140px;
margin-top:20px;
display:none;
border-radius:20px;
box-shadow:0 10px 25px rgba(255,77,136,0.3);
}

/* 💗 قلوب واضحة (أكبر + أجمل) */
.heart{
position:absolute;
color:#ff4d88;
font-size:28px;
opacity:0.9;
animation:rise 5s linear forwards;
text-shadow:0 0 10px rgba(255,77,136,0.5);
}

@keyframes rise{
0%{transform:translateY(100vh) scale(0.8);}
100%{transform:translateY(-20vh) scale(1.4);opacity:0;}
}

/* 📩 إشعار فوق الزر */
#notif{
position:fixed;
left:50%;
top:70%;
transform:translate(-50%,-50%);
background:#fff;
color:#c2185b;
padding:12px 20px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
transition:0.6s;
z-index:9999;
display:none;
}

/* 💌 رسالة */
#secret{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#fff;
color:#c2185b;
padding:25px;
border-radius:15px;
text-align:center;
z-index:9999;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* 🎧 زر النهاية */
#musicBtn{
display:none;
margin-top:20px;
background:#ff4d88;
color:#fff;
border:none;
padding:12px 20px;
border-radius:12px;
}
</style>
</head>

<body>

<!-- 🔐 القفل -->
<div id="lockScreen">
<h2>في حاجة مخبيها لك 🤍</h2>
<p>اكتبي الرمز:</p>
<b>سجوو</b>

<input id="pass" placeholder="اكتبي هنا">
<button id="loginBtn">دخول</button>
</div>

<!-- 💗 قلوب -->
<script>
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="♥";

/* توزيع أفضل */
h.style.left=Math.random()*100+"vw";

document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},350);
</script>

<!-- المحتوى -->
<div style="display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;">
<div>

<div class="text" id="text"></div>

<img id="img" class="avatar" src="Saja.png">

<button onclick="next()">كملي</button>

<button id="musicBtn" onclick="openMusic()"></button>

</div>
</div>

<!-- 📩 إشعار -->
<div id="notif">📩 اضغطي هنا قبل ما تكلمي</div>

<!-- 💌 رسالة -->
<div id="secret">
💌  
يمكن ما قلتهاش قبل…  
بس كل مرة نشوفك فيها  
نحس إني نبيك أكثر 🤍
</div>

<script>

let i=0;

let texts=[
"10 مايو 🎂\nهذا يومك انتي",
"في الجامعة… بداية كل شي",
"طيبتك وحنّيتك شدوني",
"مهندستي 🤍",
"لينا مع بعض ❣️"
];

// 🔐 دخول
document.getElementById("loginBtn").addEventListener("click",function(){

let val=document.getElementById("pass").value.trim();

if(val!=="سجوو"){
alert("الرمز غلط 🤍");
return;
}

document.getElementById("lockScreen").style.display="none";
type(texts[0]);
});

// ✍️ النص
function type(text){
let el=document.getElementById("text");
el.innerHTML=text.replace(/\n/g,"<br>");
el.classList.remove("show");
setTimeout(()=>el.classList.add("show"),100);

// 🖼️ صورة
if(i===2){
document.getElementById("img").style.display="block";
}

// 🔥 النهاية
if(i===texts.length-1){

// 📩 الإشعار ينزل فوق زر كملي
document.getElementById("notif").style.display="block";

// 🎧 تغيير الزر
let btn=document.getElementById("musicBtn");
btn.style.display="block";
btn.innerHTML="هذا ليك يا جوجو 🤍";
}
}

// التالي
function next(){
i++;
if(i<texts.length){
type(texts[i]);
}
}

// 🎧 يوتيوب
function openMusic(){
window.open("https://youtube.com/watch?v=1t9sfYqZ2iY","_blank");
}

// 📩 عند الضغط على الإشعار
document.getElementById("notif").onclick=function(){
this.style.display="none";
document.getElementById("secret").style.display="block";
}

</script>

</body>
</html>
