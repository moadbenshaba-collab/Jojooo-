<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجو 🤍</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:#fff;
text-align:center;
}

/* 🎁 الهدية */
#gift{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
font-size:80px;
cursor:pointer;
flex-direction:column;
}

/* 🔐 تسجيل الدخول */
#login{
display:none;
position:fixed;
inset:0;
justify-content:center;
align-items:center;
flex-direction:column;
}

input{
padding:10px;
margin:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#ff4d88;
color:#fff;
border:none;
border-radius:10px;
}

/* 🎂 */
#birthday{
display:none;
position:fixed;
inset:0;
background:#fff0f6;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:22px;
padding:20px;
}

/* 📰 القصة */
#story{
display:none;
position:fixed;
inset:0;
padding:20px;
font-size:18px;
line-height:1.7;
overflow:auto;
}

/* ❤️ القلب */
#bigHeart{
display:none;
position:fixed;
top:-150px;
left:50%;
transform:translateX(-50%);
font-size:120px;
cursor:pointer;
}

/* 💗 العناصر */
.p{
position:absolute;
font-size:20px;
animation:fly 6s linear forwards;
}

@keyframes fly{
to{
transform:translateY(-120vh);
opacity:0;
}
}

/* 🎧 زر */
#musicBtn{
display:none;
margin-top:20px;
padding:10px 15px;
background:#ff4d88;
color:#fff;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<!-- 🎁 -->
<div id="gift">
🎁
<small>اضغطي لفتح الهدية</small>
</div>

<!-- 🔐 -->
<div id="login">
<h3>اكتبي الرمز</h3>
<input id="pass">
<button onclick="check()">دخول</button>
</div>

<!-- 🎂 -->
<div id="birthday">
<div id="bText"></div>
<small>اضغطي الشاشة للمتابعة</small>
</div>

<!-- 📰 -->
<div id="story">
<div id="storyText"></div>

<button id="musicBtn" onclick="openMusic()">🎧 اسمعي النهاية</button>
</div>

<!-- ❤️ -->
<div id="bigHeart">❤️</div>

<script>

let i=0;

/* 🎁 البداية */
document.getElementById("gift").onclick=()=>{
gift.style.display="none";
login.style.display="flex";
};

/* 🔐 التحقق */
function check(){
if(pass.value.trim()=="سجوو"){
login.style.display="none";
startBirthday();
}else{
alert("الرمز غلط 🤍");
}
}

/* 🎂 عيد الميلاد */
function startBirthday(){
birthday.style.display="flex";

bText.innerHTML=`
كل عام وانتي بخير 🎂<br>
Happy Birthday 🎉<br>
21 🎀
`;

/* قلوب + كيك */
setInterval(()=>{
let e=document.createElement("div");
e.className="p";
e.innerHTML=Math.random()>0.5?"🎂":"🎀";
e.style.left=Math.random()*100+"vw";
document.body.appendChild(e);
setTimeout(()=>e.remove(),5000);
},300);

/* انتقال */
birthday.onclick=()=>{
birthday.style.display="none";
startStory();
};
}

/* 📰 القصة */
function startStory(){
story.style.display="block";

let full = `من يوم 3 / 12  
وانا بديت نحس بشي مختلف...

مش فاهمه في البداية  
ولا حتى عارف شنو هو بالضبط  

بس مع الأيام  
لقيت روحي نميل لك  
ونرتاح لك  

اني الفتره اللي فاتت كلها  
ومنيش مستريح  
حاس في شي ناقص...  

وكل مرة نقول  
شنو الشي هذا؟  

بس أول ما نهدرز معاك  
نحس كأني لقيته  

حتى لو ما قلتي شي  
وجودك بس...  
يرتاحله قلبي  

كأنك خديتي بيدي  
وطبطبتي عليا  
بدون حتى ما تحسي  

واني...  
رغم اني نشوف الحكي ضعف  

لكن معاك لا  

معاك نحكي  
بدون ما نحس إني غلط  
ولا إني لازم نسكت  

حتى لما نقولك مستاحشك  
مش كلمة وخلاص  

هذي شعور  

لأني نبي نهدرز معاك ديما  
مش لأن مفيش شي نديره  

لكن لأنك انتي  
الاستراحة متعي  

من كل دوشة في راسي  

مرات نحاول نهرب  
نرقد... نطلع... نضيع وقت  

بس في النهاية  
نرجع نفكر فيك  

ونلقى روحي نبي نهدرز معاك  
حتى لو دقيقة  
حتى لو كلمة  

ويمكن مرات نحس روحي ثقيل  
ونقولها لك  

بس الحقيقة...  
اني بس نبيك تكوني معايا  

ولو انتي تعبتي  
وخديتي وقتك  

اني بنستنى  

مش مجبور  
لكن خاطر نبي  

نبيك انتي 🤍  

ومش عارف كيف صارت...  
بس اني بديت نحبك 🤍  


جوجو 🤍  
كل عام وانتي بخير يا قطعة من قلبي…  
بس والله حتى كلمة “كل عام وانتي بخير” نحسها صغيرة عليك،  
لأنك مش مناسبة نعدّيها ونمشي…  
انتي حياة كاملة دخلت حياتي وغيّرت كل شي فيها.  

سجى❤️‍🩹  
لو نقعد نحكي من توّا لغدوا، ما نوصلش للي في قلبي عليك  
لكن خليني نحاول، يمكن شوية من إحساسي يوصلّك…  

انتي ملاذي الآمن…  
المكان اللي نهرب له من كل شي، ونلقى فيه راحتي بدون ما نفسر  
انتي الشمعة اللي نورتلي الظلمه كنت عايش فيها،  
والنور اللي نمشي عليه حتى في أصعب طريقي  
وصدقيني… لولاك، كان في حاجات هلبا فيا طفت من زمان  

انتي مش بس إنسانة نحبها…  
انتي طمأنينة، وسكون، وهدوء وسط زحمة حياتي  
وجودك جنبي بس يكفيني، وكلامك يبدل يومي،  
وحتى سكوتك مرات… فيه راحة ما نلقاهاش في أي حد  

أنا عارفك كويس…  
وعارف إنك مش من النوع اللي يقول كلام حلو هلبا  
بس والله كل تصرف منك يوصلني إحساس أكبر من ألف كلمة  
نشوفك في خوفك عليا، في سؤالك، في ريبوستاتك،  
في التفاصيل الصغيرة اللي غيرك يمكن ما يلاحظهاش… وأنا نعيش فيها  

سجوووو ❣️  
أنا نحبك حب مش مربوط بوقت، ولا بموقف  
حب ثابت، هادي، وصادق من قلبي  
حب خلاني نشوف فيك “حياة” مش مجرد علاقة او ارتباط  

ويمكن الحاجة اللي توجعني شوية…  
إني توّا مش في المكان اللي نبيه  
لا كونت نفسي بالشكل اللي نحلم بيه، ولا وصلت للي نستاهله  
لكن والله، ربي عالم بنيتي…  
قاعد نسعى، ونحاول، ونتعب، وندعي ليل ونهار  
إنه يفتحها في وجهي، ويرزقني من حيث لا أحتسب  

مش بس علي خاطري اني  
لكن علي خاطرك انتي يا سجى  
بش نقدر نوقف قدامك وأنا مرتاح،  
ونقول: توّا نقدر نعيشك العيشة اللي تستاهليها  
ونكون راجل قدّك، وقد قلبك، وقد كل شي عطيتيني الامل ودعمتيني فيه  

أنا مانبيش نكون مرحلة في حياتك…  
ولا ذكرى حلوة وخلاص  
أنا نبيك تكوني حلالي  
نبيك تكوني معاي في كل خطوة، في كل بداية، وفي كل نهاية  

نبي نشاركك حياتي…  
نفرح معاك، ونوقف معاك، ونحميك من كل شي  
ونكون لك الأمان زي ما كنتي ليا أمان  

ويمكن سامعتيها مني اكثر من مره  
لكن انتي عارفة مكانك عندي  
وعارفة إنك أقربلي من أي حد، وأغلى من أي شي  

كل عام وانتي معاي  
كل عام وانتي سبب في راحتي  
وكل ليله ندعي ربي يجمعني بيك بالحلال، عاجلا غير اجلا  
وتكوني نصيبي اللي ما نبيش غيره 🤍  

والله يا سجى…  
لو في دعوة مستحيل نملّ منها،  
فهي ان ربي يكتبلي النصيب وباقي العمر معاك 🤍`;
let i=0;

let inter=setInterval(()=>{
storyText.innerHTML+=full[i];
i++;
if(i>=full.length){
clearInterval(inter);

setTimeout(showHeart,1500);
}
},40);
}

/* ❤️ القلب */
function showHeart(){
bigHeart.style.display="block";

let pos=-150;
let down=setInterval(()=>{
pos+=6;
bigHeart.style.top=pos+"px";
if(pos>250) clearInterval(down);
},20);

bigHeart.onclick=explode;
}

/* 💥 الانفجار */
function explode(){

bigHeart.style.display="none";

/* 200 عنصر بدل 5000 (خفيف للموبايل) */
for(let i=0;i<200;i++){
let el=document.createElement("div");
el.className="p";
el.innerHTML=Math.random()>0.5?"💗":"🌸";
el.style.left=Math.random()*100+"vw";
el.style.top=Math.random()*100+"vh";
document.body.appendChild(el);
setTimeout(()=>el.remove(),6000);
}

/* زر الأغنية */
setTimeout(()=>{
musicBtn.style.display="block";
},1500);

/* تتبع الإصبع */
document.addEventListener("touchmove",(e)=>{
let t=e.touches[0];
spawn(t.clientX,t.clientY);
});
}

/* 👆 قلوب عند اللمس */
function spawn(x,y){
for(let i=0;i<3;i++){
let el=document.createElement("div");
el.className="p";
el.innerHTML="💗";
el.style.left=x+"px";
el.style.top=y+"px";
document.body.appendChild(el);
setTimeout(()=>el.remove(),3000);
}
}

/* 🎧 يوتيوب */
function openMusic(){
window.open("https://youtube.com/watch?v=1t9sfYqZ2iY","_blank");
}

</script>

</body>
</html>
