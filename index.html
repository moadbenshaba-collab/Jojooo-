<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجو 🤍</title>

<link rel="stylesheet" href="style.css">

<!-- GSAP -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollToPlugin.min.js"></script>
</head>

<body>

<!-- 🌸 خلفية -->
<div id="bg"></div>

<!-- 🎁 Scene 1 -->
<section id="s1" class="scene active">
  <div class="gift" id="giftBtn">🎁</div>
  <p class="hint">اضغطي لفتح الهدية 🤍</p>
</section>

<!-- 🔐 Scene 2 -->
<section id="s2" class="scene">
  <h2>اكتبي الرمز</h2>
  <p class="hint">تلميح: اسمك بدلع 🤍</p>
  <input id="pass" placeholder="••••">
  <button id="loginBtn">دخول</button>
</section>

<!-- 🎂 Scene 3 -->
<section id="s3" class="scene">
  <h1 class="big">🎂 كل عام وانتي بخير</h1>
  <p class="sub">21 سنة جمال 🤍</p>
  <p class="hint">اضغطي للمتابعة</p>
</section>

<!-- 📰 Scene 4 (Story) -->
<section id="s4" class="scene scroll">
  <div class="storyWrap">
    <div id="storyText"></div>
  </div>
</section>

<!-- 💌 Scene 5 (Card) -->
<section id="s5" class="scene">
  <div class="card">
    <img src="Saja.png" alt="">
    <div class="cardText">
      <b>جوجو 🤍</b><br><br>
      شكراً لأنك في حياتي… وصبرك عليا حتى لما نكون مزعج 🤍<br>
      سامحيني لو يوم ضايقتك، كل شي كان من حبي ليك 🤍
    </div>
    <div class="cardHint">مرّري لتحت لو في نص مخبي ↓</div>
  </div>
</section>

<!-- ❤️ Scene 6 (Heart) -->
<section id="s6" class="scene">
  <div id="heart">❤️</div>
  <p class="hint">اضغطي على القلب</p>
</section>

<!-- 🎧 زر الصوت -->
<button id="musicBtn" class="pill">🎧 شغّلي الجو</button>

<!-- ▶️ زر النهاية (يوتيوب) -->
<a id="finalBtn" class="pill final" href="https://www.youtube.com/watch?v=1t9sfYqZ2iY" target="_blank">
  ▶️ اسمعيها للنهاية
</a>

<!-- 🔊 صوت داخلي -->
<audio id="bgm" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8f5c7b1d9.mp3?filename=romantic-ambient-110828.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
