<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجو 🤍</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(180deg,#fff,#ffd6e7);
overflow:hidden;
color:#c2185b;
}

/* 🔐 شاشة القفل */
#lockScreen{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(180deg,#fff,#ffd6e7);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
text-align:center;
}

input{
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-top:10px;
text-align:center;
}

button{
margin-top:15px;
padding:12px 25px;
background:#ff4d88;
color:white;
border:none;
border-radius:12px;
font-size:16px;
}

/* النص */
.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:25px;
}

.text{
font-size:20px;
line-height:1.8;
max-width:320px;
}

/* قلوب */
.heart{
position:absolute;
color:#ff4d88;
animation:float 6s linear infinite;
}
@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);opacity:0;}
}

/* صورة */
.avatar{
width:110px;
border-radius:50%;
margin-top:15px;
}
</style>
</head>

<body>

<!-- 🔐 القفل -->
<div id="lockScreen">
<h2>في حاجةليك 🤍</h2>
<p>اكتبي الرمز:</p>
<b>سجوو</b>

<input id="pass" type="text" placeholder="اكتبي هنا">
<button onclick="checkPass()">دخول</button>
</div>

<!-- 💗 قلوب -->
<script>
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="♥";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},500);
</script>

<!-- 📜 المحتوى -->
<div class="screen">
<div>
<div class="text" id="text"></div>

<img id="img" class="avatar" style="display:none"
src="https://i.imgur.com/4AiXzf8.png">

<button onclick="next()">كملي</button>
</div>
</div>

<script>

let i = 0;

let texts = [
"10 مايو 🎂\nهذا يومك انتي",
"في الجامعة… في مادة برمجة مرئية 1\nبداية كل شي",
"طيبتك وحنّيتك شدوني من أول لحظة",
"لقيت روحي نشوفك أكثر من مجرد زميلة",
"مهندستي 🤍\nنشوف فيك أحلى مهندسة في الدنيا",
"من يوم 3 / 12 / 2025",
"لينا مع بعض ❣️",
"نحبك يا عيونيي ❣️"
];

function type(text){
let el=document.getElementById("text");
el.innerHTML="";
let j=0;

let inter=setInterval(()=>{
el.innerHTML += text[j]==="\n"?"<br>":text[j];
j++;
if(j>=text.length) clearInterval(inter);
},30);

if(i===4){
document.getElementById("img").style.display="block";
}else{
document.getElementById("img").style.display="none";
}
}

function checkPass(){

let val=document.getElementById("pass").value.trim();

if(val !== "سجوو"){
if(navigator.vibrate) navigator.vibrate([300,100,300]);
alert("الرمز غلط 🤍");
return;
}

if(navigator.vibrate) navigator.vibrate([200,100,200,100,500]);

// 🎵 الأغنية
window.open("https://youtube.com/watch?v=1t9sfYqZ2iY","_blank");

// 🔓 إغلاق القفل
document.getElementById("lockScreen").style.display="none";

// بدء القصة
i=0;
type(texts[i]);
}

function next(){
i++;
if(i<texts.length){
type(texts[i]);
}
}

</script>

</body>
</html>
