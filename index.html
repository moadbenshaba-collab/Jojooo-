<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width , initial-scale=1.0">
<title>هدية سجو 🤍</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
overflow:hidden;
background:linear-gradient(180deg,#fff,#ffd6e7);
height:100vh;
}

/* 🌸 خلفية */
body::before{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle,#fff,#ffe3ef,#ffd6e7);
z-index:-2;
animation:bg 8s infinite alternate;
}
@keyframes bg{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(15deg);}
}

/* 💗 عناصر */
.float{
position:absolute;
font-size:18px;
opacity:0.7;
animation:up linear forwards;
pointer-events:none;
}
@keyframes up{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120vh);opacity:0;}
}

/* 🎁 */
.screen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
transition:1s;
}
#gift{font-size:80px;cursor:pointer;}

/* 🔐 */
input,button{
padding:10px;
border-radius:10px;
border:1px solid #ddd;
margin-top:10px;
text-align:center;
}
button{
background:#ff4d88;
color:#fff;
border:none;
}

/* 📰 */
#story{
display:none;
overflow:auto;
font-size:18px;
line-height:2;
}

/* 💌 كرت */
#card{
display:none;
position:fixed;
inset:0;
justify-content:center;
align-items:flex-start;
padding-top:40px;
background:rgba(255,255,255,0.6);
}
.cardBox{
background:#fff;
width:85%;
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-height:80vh;
overflow:auto;
}
.cardBox small{color:#999}

/* ❤️ */
#heart{
display:none;
position:fixed;
top:-150px;
left:50%;
transform:translateX(-50%);
font-size:120px;
cursor:pointer;
}

/* 💬 رسالة صغيرة */
#miniMsg{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#fff;
padding:15px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
text-align:center;
}

/* 🎧 */
#music{
display:none;
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#ff4d88;
color:#fff;
border:none;
padding:12px 18px;
border-radius:12px;
}
</style>
</head>

<body>

<!-- 🎁 -->
<div id="gift" class="screen">
🎁
<small>اضغطي لفتح الهدية</small>
</div>

<!-- 🔐 -->
<div id="login" class="screen" style="display:none;">
<h3>اكتبي الرمز</h3>
<small>تلميح: اسمك بطريقة دلع 🤍</small>
<input id="pass">
<button onclick="check()">دخول</button>
</div>

<!-- 📰 -->
<div id="story" class="screen">
<div id="txt"></div>
</div>

<!-- 💌 -->
<div id="card">
<div class="cardBox">
<img src="Saja.png">
<div>
جوجو 🤍<br><br>
كلمات حب وامتنان لوجودك في حياتي...<br>
وصبرك عليا حتى وقت نكون مزعج<br><br>
سامحيني لو ضايقتك 🤍<br><br>
<small>كمّلي لتحت 👇</small>
</div>
</div>
</div>

<!-- ❤️ -->
<div id="heart">❤️</div>

<!-- 💬 -->
<div id="miniMsg"></div>

<button id="music">🎧 اسمعي النهاية</button>

<script>

/* 🌸 خلفية عشوائية */
setInterval(()=>{
let e=document.createElement("div");
e.className="float";
e.innerHTML=Math.random()>0.5?"💗":"🌸";
e.style.left=Math.random()*100+"vw";
e.style.animationDuration=(6+Math.random()*5)+"s";
document.body.appendChild(e);
setTimeout(()=>e.remove(),8000);
},300);

/* 🎁 */
gift.onclick=()=>{
gift.style.display="none";
login.style.display="flex";
};

/* 🔐 */
function check(){
if(pass.value.trim()=="سجوو"){
login.style.display="none";
startStory();
}else alert("جربي التلميح 🤍");
}

/* 📰 القصة جاهزة */
function startStory(){
story.style.display="flex";

txt.innerHTML=`[القصة بالكامل هنا زي ما انت كاتبها 🔥]`;

setTimeout(()=>showCard(),1000);
}

/* 💌 */
function showCard(){
card.style.display="flex";
card.onclick=()=>{
card.style.display="none";
showHeart();
};
}

/* ❤️ */
function showHeart(){
heart.style.display="block";

let y=-150;
let d=setInterval(()=>{
y+=6;
heart.style.top=y+"px";
if(y>220) clearInterval(d);
},20);
}

/* 💥 */
heart.onclick=()=>{

heart.style.display="none";

/* انفجار */
for(let i=0;i<100;i++){
let e=document.createElement("div");
e.className="float";
e.innerHTML=Math.random()>0.5?"💗":"🌸";
e.style.left=Math.random()*100+"vw";
e.style.top=Math.random()*100+"vh";
document.body.appendChild(e);
setTimeout(()=>e.remove(),5000);
}

/* 💬 رسالة */
miniMsg.style.display="block";
miniMsg.innerHTML="تقدري يعيوني ترسمي بالقلوب 🤍";

/* ✍️ رسم */
document.addEventListener("touchmove",draw);

/* 🎧 */
setTimeout(()=>music.style.display="block",2000);
};

/* رسم */
function draw(e){
let t=e.touches[0];
for(let i=0;i<3;i++){
let el=document.createElement("div");
el.className="float";
el.innerHTML="💗";
el.style.left=t.clientX+"px";
el.style.top=t.clientY+"px";
el.style.animationDuration="3s";
document.body.appendChild(el);
setTimeout(()=>el.remove(),3000);
}
}

/* 🎧 
music.onclick=()=>{
window.open("https://youtube.com/watch?v=1t9sfYqZ2iY","_blank");
};

</script>

</body>
</html>
