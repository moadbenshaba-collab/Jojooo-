<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجو 🤍</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🎁 -->
<section id="gift" class="scene active">
<div class="box" onclick="goLogin()">🎁</div>
<p>اضغطي لفتح الهدية</p>
</section>

<!-- 🔐 -->
<section id="login" class="scene">
<h2>اكتبي الرمز</h2>
<p>تلميح: اسمك بدلع 🤍</p>
<input id="pass">
<button onclick="check()">دخول</button>
</section>

<!-- 🎂 -->
<section id="cake" class="scene">
<h1>🎂</h1>
<p>اضغطي للمتابعة</p>
<button onclick="nextCake()">التالي</button>
</section>

<!-- 📰 -->
<section id="story" class="scene scroll">
<div id="text"></div>
<button onclick="nextStory()">التالي 💌</button>
</section>

<!-- 💌 -->
<section id="end" class="scene">
<h2>🤍 النهاية 🤍</h2>
<p>كل شي كان لك</p>
</section>

<script src="script.js"></script>
</body>
</html>
