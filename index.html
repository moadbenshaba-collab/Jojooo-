<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>سجو 🤍</title>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
font-family:sans-serif;
background:linear-gradient(180deg,#fff,#ffe0ef);
}

/* 🔐 شاشة الدخول */
#lockScreen{
position:fixed;
inset:0;
background:#fff;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
text-align:center;
}

input{
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-top:10px;
text-align:center;
}

button{
margin-top:15px;
padding:12px 22px;
background:#ff4d88;
color:white;
border:none;
border-radius:12px;
font-size:15px;
}

/* 💬 النص */
.text{
font-size:22px;
line-height:1.8;
max-width:320px;
opacity:0;
transform:translateY(20px);
transition:0.6s;
color:#c2185b;
position:relative;
z-index:5;
}
.show{
opacity:1;
transform:translateY(0);
}

/* 🖼️ الصورة */
.avatar{
width:140px;
margin-top:20px;
display:none;
border-radius:20px;
box-shadow:0 10px 25px rgba(255,77,136,0.3);
position:relative;
z-index:5;
}

/* 🎧 زر أنيق */
#musicBtn{
display:none;
margin-top:20px;
background:#ff4d88;
color:#fff;
border:none;
padding:10px 18px;
border-radius:10px;
font-size:14px;
position:relative;
z-index:5;
}

/* 📩 إشعار */
#notif{
position:fixed;
left:50%;
top:70%;
transform:translate(-50%,-50%);
background:#fff;
color:#c2185b;
padding:12px 18px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
transition:0.6s;
z-index:9999;
display:none;
}

/* 💌 رسالة */
#secret{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#fff;
color:#c2185b;
padding:25px;
border-radius:15px;
text-align:center;
z-index:9999;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* 💗 القلوب */
.heart{
position:absolute;
color:#ff4d88;
font-size:24px;
opacity:0.9;
animation:float 6s linear forwards;
z-index:1;
}

/* 🌸 الورد */
.rose{
position:absolute;
font-size:22px;
opacity:0.85;
animation:float 7s linear forwards;
z-index:1;
}

@keyframes float{
0%{transform:translateY(100vh) scale(0.8);}
100%{transform:translateY(-20vh) scale(1.4);opacity:0;}
}
</style>
</head>

<body>

<!-- 🔐 القفل -->
<div id="lockScreen">
<h2>في حاجة مخبيها لك 🤍</h2>
<p>اكتبي الرمز:</p>
<b>سجوو</b>

<input id="pass" placeholder="اكتبي هنا">
<button id="loginBtn">دخول</button>
</div>

<!-- المحتوى -->
<div style="display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;">
<div>

<div class="text" id="text"></div>

<img id="img" class="avatar" src="Saja.png">

<button onclick="next()">كملي</button>

<button id="musicBtn" onclick="openMusic()">هذا ليك يا جوجو 🤍</button>

</div>
</div>

<!-- 📩 إشعار -->
<div id="notif">📩 اضغطي هنا</div>

<!-- 💌 رسالة -->
<div id="secret">
💌  
يمكن ما قلتهاش قبل…  
بس كل مرة نشوفك فيها  
نحس إني نبيك أكثر 🤍
</div>

<script>

let i=0;

let texts=[
"10 مايو 🎂 هذا يومك",
"في الجامعة… بداية كل شي",
"طيبتك شدّتني من أول يوم",
"مهندستي 🤍",
"لينا مع بعض ❣️"
];


// 💥 انفجار قلوب + ورد
function burst(x,y){

for(let i=0;i<8;i++){

let h=document.createElement("div");
h.className="heart";
h.innerHTML="♥";
h.style.left=x+"px";
h.style.top=y+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);

let r=document.createElement("div");
r.className="rose";
r.innerHTML="🌸";
r.style.left=x+"px";
r.style.top=y+"px";
document.body.appendChild(r);
setTimeout(()=>r.remove(),7000);

}
}

// 🌸 حركة مستمرة ناعمة
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="♥";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},800);


// 👆 كل لمسة = ورود + قلوب
document.addEventListener("click",function(e){
burst(e.clientX,e.clientY);
});


// 🔐 دخول
document.getElementById("loginBtn").addEventListener("click",function(){

let val=document.getElementById("pass").value.trim();

if(val!=="سجوو"){
alert("الرمز غلط 🤍");
return;
}

// 💥 انفجار من الزر
burst(window.innerWidth/2, window.innerHeight/2);

document.getElementById("lockScreen").style.display="none";

type(texts[0]);
});


// ✍️ النص
function type(text){
let el=document.getElementById("text");
el.innerHTML=text.replace(/\n/g,"<br>");
el.classList.add("show");

// 🖼️ صورة
if(i===3){
document.getElementById("img").style.display="block";
}

// 🔥 النهاية
if(i===texts.length-1){
document.getElementById("notif").style.display="block";
document.getElementById("musicBtn").style.display="block";
}
}


// التالي
function next(){
i++;
if(i<texts.length){
type(texts[i]);
}
}


// 🎧 يوتيوب
function openMusic(){
window.open("https://youtube.com/watch?v=1t9sfYqZ2iY","_blank");
}


// 📩 إشعار
document.getElementById("notif").onclick=function(){
this.style.display="none";
document.getElementById("secret").style.display="block";
};

</script>

</body>
</html>
