<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجو 🤍</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="bgfx"></canvas>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2023/03/28/audio_9c6c3.mp3">
</audio>

<!-- 🎁 -->
<section id="gift" class="scene active">
<h1>🎁</h1>
<p>اضغطي… في حاجة مستنيتك 🤍</p>
<button onclick="start()">فتح</button>
</section>

<!-- 🔐 -->
<section id="login" class="scene">
<h2>الرمز 🤍</h2>
<p>تلميح: اسمك بالدلع</p>
<input id="pass">
<button onclick="check()">دخول</button>
</section>

<!-- 🎂 -->
<section id="cake" class="scene">
<h1>🎂</h1>
<p id="hint">الخطوة 1: إشعال الشمعة</p>

<div id="candle" class="candle"></div>

<button onclick="light()">إشعال 🕯️</button>
<button id="cutBtn" onclick="cut()" style="display:none;">قص الكيكة 🔪</button>
</section>

<!-- 📖 -->
<section id="story" class="scene scroll">
<div id="storyText"></div>
<button onclick="go('card')">قرأت ✔</button>
</section>

<!-- 💌 -->
<section id="card" class="scene">
<div class="card" id="cardBox">
<img src="Saja.png">
<p>جوجو 🤍<br>سامحيني لو ضايقتك… كله من حبي</p>
<button onclick="flip()">نحبك</button>
<button onclick="showHeart()">كملي</button>
</div>
</section>

<!-- ❤️ -->
<section id="heartScene" class="scene">
<div id="bigHeart">❤️</div>
<p>اضغطي القلب 🤍</p>
</section>

<!-- 🎁 -->
<section id="surprise" class="scene">
<h2>مفاجآت 🎁</h2>
<div id="alerts"></div>
<button onclick="nextSurprise()">ابدئي</button>
<button onclick="go('draw')">ارسم 💗</button>
<button onclick="yt()">🎧 النهاية</button>
</section>

<!-- 🖌️ -->
<section id="draw" class="scene">
<h3>ارسمي 💗</h3>
</section>

<script src="script.js"></script>
</body>
</html>
