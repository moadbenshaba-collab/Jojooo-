<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجو 🤍</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🎁 -->
<section id="gift" class="scene active">
<div class="gift" onclick="openGift()">🎁</div>
<p>اضغطي لبدء المفاجأة</p>
</section>

<!-- 🔐 -->
<section id="login" class="scene">
<h2>اكتبي الرمز</h2>
<input id="pass">
<button onclick="check()">دخول</button>
</section>

<!-- 🎂 -->
<section id="cake" class="scene">
<div id="cakeBox">
<div id="cake">🎂</div>
<div id="candle">🕯️</div>
<div id="knife">🔪</div>
</div>
<p id="hint">اضغطي على الشمعة</p>
</section>

<!-- 📰 القصة -->
<section id="story" class="scene scroll">
<div id="storyText"></div>

<button id="readBtn" onclick="finishStory()" style="display:none;">
قرأت 🤍
</button>
</section>

<!-- 💌 -->
<section id="end" class="scene">
<h1>🤍 النهاية</h1>
<p>كل شي كان لك</p>
</section>

<script src="script.js"></script>
</body>
</html>
