<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجو 🤍</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#000;
overflow:hidden;
color:#fff;
}

/* 🔐 القفل */
#lockScreen{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
text-align:center;
}

input{
padding:12px;
border-radius:10px;
border:none;
margin-top:10px;
text-align:center;
}

button{
margin-top:15px;
padding:12px 25px;
background:#ff4d88;
color:white;
border:none;
border-radius:12px;
font-size:16px;
}

/* ✨ النص */
.text{
font-size:22px;
line-height:1.8;
max-width:320px;
opacity:0;
transform:scale(0.9);
transition:0.6s;
}
.show{
opacity:1;
transform:scale(1);
}

/* 💗 قلوب */
.heart{
position:absolute;
color:#ff4d88;
animation:float 6s linear infinite;
}
@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);opacity:0;}
}

/* 🖼️ صورة القنينة */
.avatar{
width:140px;
margin-top:20px;
display:none;
animation:pop 1s ease;
}
@keyframes pop{
0%{transform:scale(0);}
100%{transform:scale(1);}
}

/* ✨ لمعان */
.glow{
animation:glow 1s infinite alternate;
}
@keyframes glow{
from{filter:drop-shadow(0 0 5px pink);}
to{filter:drop-shadow(0 0 20px pink);}
}

/* 📩 إشعار */
#notif{
position:fixed;
top:-100px;
left:50%;
transform:translateX(-50%);
background:#fff;
color:#000;
padding:12px 20px;
border-radius:12px;
transition:0.6s;
z-index:9999;
cursor:pointer;
}

/* 💌 رسالة */
#secret{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#fff;
color:#c2185b;
padding:25px;
border-radius:15px;
text-align:center;
z-index:9999;
}
</style>
</head>

<body>

<!-- 🔐 القفل -->
<div id="lockScreen">
<h2>في حاجة مخبيها لك 🤍</h2>
<p>اكتبي الرمز:</p>
<b>سجوو</b>
<input id="pass">
<button onclick="start()">دخول</button>
</div>

<!-- المحتوى -->
<div style="display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;">
<div>
<div class="text" id="text"></div>

<img id="img" class="avatar" src="saja.png">

<button onclick="next()">كملي</button>

<button id="musicBtn" onclick="openMusic()" style="display:none;background:#000;">
🎧 في حاجة أخيرة ليك…
</button>

</div>
</div>

<!-- إشعار -->
<div id="notif">📩 Sajo ❤️: عندك رسالة جديدة</div>

<!-- رسالة سرية -->
<div id="secret">
💌  
يمكن ما قلتهاش قبل…  
بس كل مرة نشوفك فيها  
نحس إني نبيك أكثر من أي شي 🤍
</div>

<script>

// 💗 قلوب
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="♥";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},500);

// 📅 الأيام
let startDate=new Date("2025-12-03");
let endDate=new Date("2026-05-10");
let days=Math.floor((endDate-startDate)/(1000*60*60*24));

// النصوص
let texts=[
"10 مايو 🎂\nهذا يومك انتي",
"في الجامعة… بداية كل شي",
"طيبتك وحنّيتك شدوني",
"مهندستي 🤍\nأحلى مهندسة في الدنيا",
"لينا مع بعض ❣️ لمدة "+days+" يوم",
"نحبك يا عيونيي ❣️"
];

let i=0;

// 🔐 دخول
function start(){
let val=document.getElementById("pass").value.trim();

if(val!=="سجوو"){
navigator.vibrate([300,100,300]);
alert("الرمز غلط 🤍");
return;
}

navigator.vibrate([200,100,200]);

document.getElementById("lockScreen").style.display="none";

type(texts[0]);
}

// ✍️ عرض النص
function type(text){
let el=document.getElementById("text");
el.innerHTML=text.replace(/\n/g,"<br>");
el.classList.remove("show");

setTimeout(()=>el.classList.add("show"),100);

// 🖼️ القنينة
if(i===3){
let img=document.getElementById("img");
img.style.display="block";

// ✨ لمعان بعد ثانيتين
setTimeout(()=>{
img.classList.add("glow");
},2000);
}

// 🔥 النهاية
if(i===texts.length-1){

navigator.vibrate([300,100,300,100,500]);

// إشعار
setTimeout(()=>{
document.getElementById("notif").style.top="20px";
},2000);

// زر الأغنية
document.getElementById("musicBtn").style.display="block";
}
}

// التالي
function next(){
i++;
if(i<texts.length){
type(texts[i]);
}
}

// 🎧 أغنية
function openMusic(){
window.open("https://youtube.com/watch?v=1t9sfYqZ2iY","_blank");
}

// 📩 فتح الرسالة
document.getElementById("notif").onclick=function(){
this.style.display="none";
document.getElementById("secret").style.display="block";

navigator.vibrate([200,100,200,100,500]);
}

</script>

</body>
</html>
