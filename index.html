<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجو 🤍</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="fx"></canvas>

<!-- 🎁 -->
<section id="gift" class="scene active">
<div class="gift" onclick="goLogin()">🎁</div>
<p>اضغطي لبدء الرحلة</p>
</section>

<!-- 🔐 -->
<section id="login" class="scene">
<h2>اكتبي الرمز</h2>
<input id="pass">
<button onclick="check()">دخول</button>
</section>

<!-- 🎂 -->
<section id="cake" class="scene">
<h1>🎂</h1>
<button onclick="openStory()">فتح الرسالة</button>
</section>

<!-- 📖 -->
<section id="story" class="scene scroll">
<div id="storyText"></div>
<button onclick="openCard()">اكتمال القراءة ✔</button>
</section>

<!-- 💌 كرت -->
<section id="card" class="scene">
<div class="cardBox">
<img src="Saja.png">
<p>جوجو 🤍</p>
<button onclick="openSurprise()">متابعة</button>
</div>
</section>

<!-- 🎁 مفاجآت -->
<section id="surprise" class="scene">
<h2>🎁 مفاجآت</h2>
<button onclick="startDraw()">ابدئي الرسم 💗</button>
<button onclick="openYT()">🎧 اليوتيوب</button>
</section>

<!-- 🖌️ رسم -->
<section id="draw" class="scene">
<h3>ارسم باللمس 💗</h3>
<p>المس الشاشة</p>
</section>

<script src="script.js"></script>
</body>
</html>
