<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هدية سجو 🤍</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
overflow:hidden;
background:linear-gradient(180deg,#fff,#ffd6e7);
height:100vh;
}

/* 🌸 خلفية */
body::before{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle,#fff,#ffe3ef,#ffd6e7);
z-index:-1;
}

/* 💗 عناصر */
.float{
position:absolute;
animation:up linear forwards;
pointer-events:none;
}
@keyframes up{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120vh);opacity:0;}
}

/* شاشة */
.screen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

/* عناصر */
input,button{
padding:10px;
border-radius:10px;
border:1px solid #ddd;
margin-top:10px;
}
button{
background:#ff4d88;
color:#fff;
border:none;
}

/* 📰 */
#story{
display:none;
overflow:auto;
font-size:18px;
line-height:2;
}

/* 💌 */
#card{
display:none;
position:fixed;
inset:0;
justify-content:center;
align-items:flex-start;
padding-top:40px;
background:rgba(255,255,255,0.6);
}
.cardBox{
background:#fff;
width:85%;
padding:15px;
border-radius:15px;
text-align:center;
max-height:80vh;
overflow:auto;
}

/* ❤️ */
#heart{
display:none;
position:fixed;
top:-150px;
left:50%;
transform:translateX(-50%);
font-size:120px;
}

/* 💬 */
#miniMsg{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#fff;
padding:15px;
border-radius:10px;
}

/* 🎧 */
#music{
display:none;
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
}
</style>
</head>

<body>

<div id="gift" class="screen">🎁<br><small>اضغطي لفتح الهدية</small></div>

<div id="login" class="screen" style="display:none;">
<h3>اكتبي الرمز</h3>
<input id="pass">
<button id="btn">دخول</button>
</div>

<div id="birthday" class="screen" style="display:none;"></div>

<div id="story" class="screen"><div id="txt"></div></div>

<div id="card">
<div class="cardBox">
<img src="Saja.png" style="width:100%;border-radius:10px;">
<div>جوجو 🤍<br>سامحيني لو ضايقتك</div>
</div>
</div>

<div id="heart">❤️</div>
<div id="miniMsg"></div>

<button id="music">🎧 اسمعي النهاية</button>

<script>

/* 🔧 تعريف العناصر (المهم) */
const gift = document.getElementById("gift");
const login = document.getElementById("login");
const birthday = document.getElementById("birthday");
const story = document.getElementById("story");
const txt = document.getElementById("txt");
const card = document.getElementById("card");
const heart = document.getElementById("heart");
const miniMsg = document.getElementById("miniMsg");
const music = document.getElementById("music");
const pass = document.getElementById("pass");
const btn = document.getElementById("btn");

/* 🌸 خلفية */
setInterval(()=>{
let e=document.createElement("div");
e.className="float";
e.innerHTML=Math.random()>0.5?"💗":"🌸";
e.style.left=Math.random()*100+"vw";
e.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(e);
setTimeout(()=>e.remove(),8000);
},300);

/* 🎁 */
gift.onclick=()=>{
gift.style.display="none";
login.style.display="flex";
};

/* 🔐 */
btn.onclick=()=>{
if(pass.value.trim()=="سجوو"){
login.style.display="none";
startBirthday();
}else alert("غلط 🤍");
};

/* 🎂 */
function startBirthday(){
birthday.style.display="flex";
birthday.innerHTML="كل عام وانتي بخير 🎂<br><small>اضغطي</small>";
birthday.onclick=()=>{
birthday.style.display="none";
startStory();
};
}

/* 📰 */
function startStory(){
story.style.display="flex";
txt.innerText="القصة هنا...";
setTimeout(showCard,1000);
}

/* 💌 */
function showCard(){
card.style.display="flex";
card.onclick=()=>{
card.style.display="none";
showHeart();
};
}

/* ❤️ */
function showHeart(){
heart.style.display="block";
heart.onclick=()=>{
heart.style.display="none";
miniMsg.style.display="block";
miniMsg.innerText="تقدري ترسمي بالقلوب 🤍";

/* رسم */
document.addEventListener("touchmove",(e)=>{
let t=e.touches[0];
let el=document.createElement("div");
el.innerHTML="💗";
el.style.position="absolute";
el.style.left=t.clientX+"px";
el.style.top=t.clientY+"px";
document.body.appendChild(el);
setTimeout(()=>el.remove(),2000);
});

/* مفاجآت */
document.addEventListener("click",showSurprise);

music.style.display="block";
};
}

/* 🎁 مفاجآت */
let count=0;
function showSurprise(){
if(count>=21)return;
count++;

let box=document.createElement("div");
box.style.position="fixed";
box.style.top="50%";
box.style.left="50%";
box.style.transform="translate(-50%,-50%)";
box.style.background="#fff";
box.style.padding="10px";
box.innerText="مفاجأة "+count;
document.body.appendChild(box);
setTimeout(()=>box.remove(),2000);
}

/* 🎧 */
music.onclick=()=>{
window.open("https://youtube.com/watch?v=1t9sfYqZ2iY");
};

</script>

</body>
</html>
